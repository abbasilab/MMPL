num_classes: 4
classes:
    - Standing
    - Walking
    - Running
    - Badminton
class_to_index:
  standing: 0
  walking: 1
  running: 2
  badminton: 3
num_variables: 6

encoding:
  input_dim: 1
  hidden_dim: 32
  latent_dim: 16
  batch_size: 40
  lr: 0.01
  gamma: 0.999
  epochs: 200
  m: 1.0
  save_dir: models/basicmotions/encoding/

single_variable_prototypes:
  num_prototypes: 4
  num_layers: 1
  dropout: 0.0
  batch_size: 40
  lr: 0.01
  gamma: 0.999
  epochs: 300
  l1: 1.0
  l2: 0.1
  l3: 1.0
  l4: 1.0
  save_dir: models/basicmotions/single_variable_prototypes/

multivariable_prototypes:
  num_layers: 1
  batch_size: 40
  lr: 0.01
  gamma: 0.999
  epochs: 500
  l1: 1.0
  l2: 1.0
  l3: 1.0
  l4: 1.0
  save_dir: models/basicmotions/multivariable_prototypes/